<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#080b10">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Blade Box Arena">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="application-name" content="Blade Box Arena">
    <title>Blade Box Arena</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <canvas id="gameCanvas" aria-label="Blade Box Arena game canvas"></canvas>
    </main>
    <section id="orientationGate" class="orientation-gate" aria-live="polite" hidden>
      <div class="orientation-gate__panel">
        <h1>Turn your phone sideways to play Blade Box Arena.</h1>
      </div>
    </section>
    <section id="textInputOverlay" class="text-input-overlay" aria-modal="true" role="dialog" hidden>
      <form id="textInputForm" class="text-input-panel">
        <label id="textInputLabel" for="textInputField">Enter text</label>
        <input id="textInputField" type="text" autocomplete="off" autocapitalize="sentences" spellcheck="false">
        <div class="text-input-actions">
          <button id="textInputCancel" type="button">Cancel</button>
          <button id="textInputSubmit" type="submit">OK</button>
        </div>
      </form>
    </section>
    <script src="src/config.js"></script>
    <script src="src/pwa.js"></script>
    <script src="src/game.js"></script>
  </body>
</html>
